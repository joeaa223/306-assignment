{% extends "dashboard/base.html" %}

{% block title %}Page Not Found - Service Day Dashboard{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto py-24 text-center space-y-6 animate-fade-in">
    <div class="inline-flex p-6 bg-slate-50 rounded-full text-slate-300">
        <svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
    </div>
    <div class="space-y-2">
        <h1 class="text-6xl font-black text-slate-900">404</h1>
        <p class="text-2xl font-bold text-slate-600">Oops! Page not found.</p>
        <p class="text-slate-400">The page you're looking for doesn't exist or has been moved.</p>
    </div>
    <div class="pt-6">
        <a href="{% url 'ngo_list' %}" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 transition inline-block">
            Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
