{% extends "dashboard/base.html" %}

{% block title %}System Error - Service Day Dashboard{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto py-24 text-center space-y-6 animate-fade-in">
    <div class="inline-flex p-6 bg-red-50 rounded-full text-red-300">
        <svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
    </div>
    <div class="space-y-2">
        <h1 class="text-6xl font-black text-slate-900">500</h1>
        <p class="text-2xl font-bold text-slate-600">Internal Server Error.</p>
        <p class="text-slate-400">Something went wrong on our end. We've been notified and are looking into it.</p>
    </div>
    <div class="pt-6">
        <a href="{% url 'ngo_list' %}" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black shadow-xl shadow-slate-200 hover:bg-slate-800 transition inline-block">
            Try Again
        </a>
    </div>
</div>
{% endblock %}
