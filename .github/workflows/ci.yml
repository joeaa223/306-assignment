# Lab 12 & 13: CI Pipeline for Testing and Deployment Checks
name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Lab 13: Adding Redis service for CI environment
    services:
      redis:
        image: redis:6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.13.1
      uses: actions/setup-python@v4
      with:
        python-version: '3.13.1'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run System Checks (Lab 13 Task 4.2)
      run: |
        python manage.py check
        
    - name: Run Tests (Lab 12 Task 4.5)
      run: |
        python manage.py test
