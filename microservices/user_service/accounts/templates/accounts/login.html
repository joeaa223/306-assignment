<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Service Day Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md animate-fade-up">
        <!-- Logo -->
        <div class="text-center mb-10">
            <div
                class="inline-flex items-center justify-center w-14 h-14 bg-blue-600 rounded-2xl mb-5 shadow-lg shadow-blue-500/20">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">Service<span class="text-blue-600">Day</span>
            </h1>
            <p class="text-slate-500 text-sm font-medium mt-2">CSR Activity Management System</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-3xl p-10 shadow-xl shadow-slate-200/50 border border-slate-100">
            <div class="mb-8">
                <h2 class="text-2xl font-black text-slate-900 tracking-tight">Welcome back</h2>
                <p class="text-slate-500 text-sm font-medium mt-1">Please enter your details to sign in</p>
            </div>

            <!-- Error Messages -->
            {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                <div class="p-3 rounded-xl text-sm font-semibold flex items-center gap-2
                    {% if message.tags == 'error' %}bg-red-50 text-red-600 border border-red-100
                    {% elif message.tags == 'success' %}bg-emerald-50 text-emerald-600 border border-emerald-100
                    {% else %}bg-blue-50 text-blue-600 border border-blue-100{% endif %}">
                    {% if message.tags == 'error' %}
                    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    {% endif %}
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'login' %}" class="space-y-5">
                {% csrf_token %}

                <!-- Hidden 'next' field for redirect after login -->
                <input type="hidden" name="next" value="{{ next }}">

                <!-- Username -->
                <div>
                    <label for="username"
                        class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Username</label>
                    <input type="text" id="username" name="username" required autofocus
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 font-semibold text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                        placeholder="Enter your username">
                </div>

                <!-- Password -->
                <div>
                    <label for="password"
                        class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 font-semibold text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                        placeholder="Enter your password">
                </div>

                <!-- Submit -->
                <button type="submit"
                    class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-blue-700 active:scale-[0.98] transition-all shadow-lg shadow-blue-500/25">
                    Sign In
                </button>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-slate-600 text-xs font-medium mt-8">
            © 2026 Service Day Dashboard · BIT306 CSR Initiative
        </p>
    </div>
</body>

</html>
