{% extends "dashboard/base.html" %}

{% block title %}Scanning QR... - Service Day Dashboard{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-12 animate-fade-in text-center">
    <!-- Phone Mockup Frame -->
    <div
        class="bg-slate-900 rounded-[3rem] p-4 pt-12 pb-12 shadow-2xl relative border-4 border-slate-800 shadow-blue-500/10 active:scale-[0.99] transition-transform">
        <!-- Notch -->
        <div class="absolute top-4 left-1/2 -translate-x-1/2 w-24 h-6 bg-slate-800 rounded-full"></div>

        <!-- Screen Content -->
        <div
            class="bg-black rounded-[2rem] aspect-[9/16] overflow-hidden relative flex flex-col items-center justify-center">

            <!-- Camera View (Mock) -->
            <div class="absolute inset-0 bg-slate-800 opacity-60">
                <!-- Grid dots to look like camera noise -->
                <div class="absolute inset-0"
                    style="background-image: radial-gradient(#ffffff22 1px, transparent 1px); background-size: 20px 20px;">
                </div>
            </div>

            <!-- Scanning Frame -->
            <div
                class="relative w-64 h-64 border-2 border-blue-400 rounded-3xl flex items-center justify-center overflow-hidden">
                <!-- Moving Laser Line -->
                <div
                    class="absolute top-0 left-0 w-full h-1 bg-blue-400 shadow-[0_0_15px_#60a5fa] animate-scan-line z-20">
                </div>

                <!-- Corner Borders -->
                <div class="absolute top-4 left-4 w-8 h-8 border-t-4 border-l-4 border-white rounded-tl-lg"></div>
                <div class="absolute top-4 right-4 w-8 h-8 border-t-4 border-r-4 border-white rounded-tr-lg"></div>
                <div class="absolute bottom-4 left-4 w-8 h-8 border-b-4 border-l-4 border-white rounded-bl-lg"></div>
                <div class="absolute bottom-4 right-4 w-8 h-8 border-b-4 border-r-4 border-white rounded-br-lg"></div>

                <!-- Ghostly Icon -->
                <svg class="w-32 h-32 text-blue-400 opacity-30 animate-pulse" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                </svg>
            </div>

            <!-- UI Text -->
            <div class="absolute bottom-12 w-full text-center px-6">
                <p class="text-white font-black text-lg tracking-tight mb-1">Align QR Code</p>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">{{ activity.ngo_name }}
                    Check-in</p>
            </div>

            <!-- Status Indicator -->
            <div class="absolute bottom-4 flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-blue-500 animate-ping"></div>
                <span class="text-[10px] text-blue-400 font-black uppercase">Scanning in progress...</span>
            </div>
        </div>
    </div>


</div>

<!-- Redirect Script -->
<script>
    setTimeout(() => {
        window.location.href = "{% url 'my_schedule' %}";
    }, 2500); 
</script>

<style>
    @keyframes scanLine {
        0% {
            top: 0;
        }

        100% {
            top: 100%;
        }
    }

    .animate-scan-line {
        animation: scanLine 2s linear infinite;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .animate-fade-in {
        animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
</style>
{% endblock %}
